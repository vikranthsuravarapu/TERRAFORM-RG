# ═══════════════════════════════════════════════════════════════════
# ADO Terraform Pipeline — No Extensions, Service Connection Auth
# With Remote Backend (Azure Blob Storage)
# ═══════════════════════════════════════════════════════════════════

trigger: none
pr: none

pool:
  vmImage: ubuntu-latest

parameters:
  - name: action
    displayName: "What do you want to do?"
    type: string
    default: Create
    values:
      - Create
      - Destroy

  - name: environment
    displayName: "Target Environment"
    type: string
    default: dev
    values:
      - dev
      - staging
      - prod

  - name: location
    displayName: "Azure Region"
    type: string
    default: westeurope
    values:
      - westeurope
      - northeurope
      - eastus
      - southindia

variables:
  - name: terraformVersion
    value: "1.7.5"
  - name: backendResourceGroup
    value: "rg-terraform-state"
  - name: backendStorageAccount
    value: "terraformstatestorage295"
  - name: backendContainer
    value: "tfstate"
  - name: stateFile
    value: "${{ parameters.environment }}.terraform.tfstate"
  - name: workingDirectory
    value: "$(System.DefaultWorkingDirectory)/terraform"

# ═══════════════════════════════════════════════════════════════════
# STAGE 1 — PLAN
# ═══════════════════════════════════════════════════════════════════
stages:
  - stage: Plan
    displayName: "📋 Plan — ${{ parameters.action }} on ${{ parameters.environment }}"
    jobs:
      - job: TerraformPlan
        displayName: "Terraform Plan"
        steps:

          # Install Terraform
          - script: |
              wget -q https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_linux_amd64.zip
              unzip -q terraform_$(terraformVersion)_linux_amd64.zip
              sudo mv terraform /usr/local/bin/
              terraform version
            displayName: "Install Terraform $(terraformVersion)"

          # Terraform Init — service connection + backend config
          - task: AzureCLI@2
            displayName: "Terraform Init"
            inputs:
              azureSubscription: subscriptionauthenticator
              scriptType: bash
              scriptLocation: inlineScript
              workingDirectory: $(workingDirectory)
              addSpnToEnvironment: true
              inlineScript: |
                export ARM_CLIENT_ID=$servicePrincipalId
                export ARM_CLIENT_SECRET=$servicePrincipalKey
                export ARM_TENANT_ID=$tenantId
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                terraform init \
                  -backend-config="resource_group_name=$(backendResourceGroup)" \
                  -backend-config="storage_account_name=$(backendStorageAccount)" \
                  -backend-config="container_name=$(backendContainer)" \
                  -backend-config="key=$(stateFile)"

          # Terraform Plan — Create or Destroy
          - task: AzureCLI@2
            displayName: "Terraform Plan (${{ parameters.action }})"
            inputs:
              azureSubscription: subscriptionauthenticator
              scriptType: bash
              scriptLocation: inlineScript
              workingDirectory: $(workingDirectory)
              addSpnToEnvironment: true
              inlineScript: |
                export ARM_CLIENT_ID=$servicePrincipalId
                export ARM_CLIENT_SECRET=$servicePrincipalKey
                export ARM_TENANT_ID=$tenantId
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                if [ "${{ parameters.action }}" = "Destroy" ]; then
                  terraform plan -destroy -out=tfplan \
                    -var="environment=${{ parameters.environment }}" \
                    -var="location=${{ parameters.location }}"
                else
                  terraform plan -out=tfplan \
                    -var="environment=${{ parameters.environment }}" \
                    -var="location=${{ parameters.location }}"
                fi

          # Save plan artifact
          - task: PublishPipelineArtifact@1
            displayName: "Save Plan Artifact"
            inputs:
              targetPath: "$(workingDirectory)/tfplan"
              artifact: terraform-plan

# ═══════════════════════════════════════════════════════════════════
# STAGE 2 — APPLY (requires approval gate in ADO Portal)
# ═══════════════════════════════════════════════════════════════════
  - stage: Apply
    displayName: "🚀 ${{ parameters.action }} — ${{ parameters.environment }}"
    dependsOn: Plan
    jobs:
      - deployment: TerraformApply
        displayName: "${{ parameters.action }} Infrastructure"
        environment: ${{ parameters.environment }}
        strategy:
          runOnce:
            deploy:
              steps:

                # Install Terraform
                - script: |
                    wget -q https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_linux_amd64.zip
                    unzip -q terraform_$(terraformVersion)_linux_amd64.zip
                    sudo mv terraform /usr/local/bin/
                    terraform version
                  displayName: "Install Terraform"

                # Download saved plan
                - task: DownloadPipelineArtifact@2
                  displayName: "Download Plan Artifact"
                  inputs:
                    artifact: terraform-plan
                    path: $(workingDirectory)

                # Terraform Init with backend
                - task: AzureCLI@2
                  displayName: "Terraform Init"
                  inputs:
                    azureSubscription: subscriptionauthenticator
                    scriptType: bash
                    scriptLocation: inlineScript
                    workingDirectory: $(workingDirectory)
                    addSpnToEnvironment: true
                    inlineScript: |
                      export ARM_CLIENT_ID=$servicePrincipalId
                      export ARM_CLIENT_SECRET=$servicePrincipalKey
                      export ARM_TENANT_ID=$tenantId
                      export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                      terraform init \
                        -backend-config="resource_group_name=$(backendResourceGroup)" \
                        -backend-config="storage_account_name=$(backendStorageAccount)" \
                        -backend-config="container_name=$(backendContainer)" \
                        -backend-config="key=$(stateFile)"

                # Terraform Apply
                - task: AzureCLI@2
                  displayName: "Terraform ${{ parameters.action }}"
                  inputs:
                    azureSubscription: subscriptionauthenticator
                    scriptType: bash
                    scriptLocation: inlineScript
                    workingDirectory: $(workingDirectory)
                    addSpnToEnvironment: true
                    inlineScript: |
                      export ARM_CLIENT_ID=$servicePrincipalId
                      export ARM_CLIENT_SECRET=$servicePrincipalKey
                      export ARM_TENANT_ID=$tenantId
                      export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                      terraform apply -auto-approve tfplan